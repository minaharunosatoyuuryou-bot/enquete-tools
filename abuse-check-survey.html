
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>虐待の芽チェックリスト（入所施設版）</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --ink:#2f3b34;
    --paper:#f6f4ee;
    --line:#d8d2c2;
    --moss:#5b7360;
    --moss-dark:#3f5245;
    --clay:#b5613f;
    --warn-bg:#fbe9a8;
    --warn-border:#e0b93c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.7;
    padding-bottom:60px;
  }
  header{
    background:var(--moss-dark);
    color:#f6f4ee;
    padding:28px 20px 22px;
    text-align:center;
  }
  header h1{
    margin:0 0 6px;
    font-size:1.3rem;
    letter-spacing:.03em;
  }
  header p{
    margin:0;
    font-size:.82rem;
    color:#d9e3dc;
  }
  .wrap{max-width:720px;margin:0 auto;padding:18px 16px;}
  .card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:10px;
    padding:18px 18px 20px;
    margin-bottom:16px;
  }
  .intro{font-size:.86rem;color:#4a5650;}
  .round-field{margin-bottom:4px;}
  .round-field label{display:block;font-size:.82rem;font-weight:bold;margin-bottom:6px;}
  .round-field input{
    width:100%;padding:10px;border:1px solid var(--line);border-radius:6px;font-size:.95rem;
  }
  .qnum{
    display:inline-block;
    background:var(--moss);
    color:#fff;
    font-size:.75rem;
    border-radius:5px;
    padding:2px 8px;
    margin-bottom:8px;
  }
  .qtext{font-size:.92rem;margin:0 0 12px;font-weight:600;}
  .opts{display:flex;flex-direction:column;gap:8px;}
  .opt{
    display:flex;align-items:center;gap:10px;
    border:1px solid var(--line);border-radius:8px;
    padding:10px 12px;cursor:pointer;
    font-size:.9rem;
    transition:background .15s, border-color .15s;
  }
  .opt input{width:18px;height:18px;accent-color:var(--moss);}
  .opt.checked{border-color:var(--moss);background:#eef3ef;}
  .submit-btn{
    width:100%;padding:14px;background:var(--moss-dark);color:#fff;border:none;
    border-radius:8px;font-size:1rem;font-weight:bold;cursor:pointer;margin-top:6px;
  }
  .submit-btn:disabled{opacity:.5;}
  .footer-link{
    text-align:center;margin-top:24px;
  }
  .footer-link button{
    background:none;border:1px solid var(--line);color:#6b6257;
    padding:8px 14px;border-radius:20px;font-size:.78rem;cursor:pointer;
  }
  .thanks{
    text-align:center;padding:40px 16px;
  }
  .thanks .mark{font-size:2.2rem;color:var(--moss);}
  .hidden{display:none !important;}
  /* 集計画面 */
  .agg-toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
  .agg-toolbar select,.agg-toolbar button{
    padding:8px 10px;border:1px solid var(--line);border-radius:6px;font-size:.85rem;background:#fff;
  }
  .agg-toolbar button.primary{background:var(--moss-dark);color:#fff;border:none;cursor:pointer;}
  table.agg{width:100%;border-collapse:collapse;font-size:.78rem;margin-top:6px;}
  table.agg th,table.agg td{border:1px solid var(--line);padding:6px 6px;text-align:center;vertical-align:middle;}
  table.agg th{background:#eef1ec;}
  table.agg td.qtext-cell{text-align:left;font-weight:600;width:34%;}
  table.agg td.warn{background:var(--warn-bg);border-color:var(--warn-border);font-weight:bold;}
  .agg-note{font-size:.75rem;color:#7a7264;margin-top:8px;}
  .total-line{font-size:.8rem;color:#4a5650;margin-bottom:10px;}
  .pw-box{max-width:320px;margin:60px auto;text-align:center;}
  .pw-box input{padding:10px;font-size:1rem;width:60%;border:1px solid var(--line);border-radius:6px;}
  .pw-box button{padding:10px 16px;font-size:1rem;border:none;background:var(--moss-dark);color:#fff;border-radius:6px;cursor:pointer;margin-left:6px;}
  .err{color:var(--clay);font-size:.8rem;margin-top:8px;}
</style>
</head>
<body>

<header>
  <h1>虐待の芽チェックリスト（入所施設版）</h1>
  <p>無記名・匿名での自己チェックです。安心してご回答ください。</p>
</header>

<div class="wrap">

  <!-- ▼ 回答フォーム画面 -->
  <div id="formView">
    <div class="card intro">
      虐待の芽や不適切ケアを自己チェックして、高齢者虐待を防止しましょう。あてはまるものを選び、最後に送信してください。回答は匿名で集計され、個人が特定されることはありません。
    </div>

    <div class="card round-field">
      <label>実施回（例：2026年7月度）</label>
      <input type="text" id="roundInput" placeholder="施設からの案内に記載の実施回を入力してください">
    </div>

    <form id="checklistForm"></form>

    <button class="submit-btn" id="submitBtn">回答を送信する</button>

    <div class="footer-link">
      <button type="button" id="toAggBtn">🔒 委員会用：集計結果を見る</button>
    </div>
  </div>

  <!-- ▼ 送信完了画面 -->
  <div id="thanksView" class="hidden">
    <div class="card thanks">
      <div class="mark">✓</div>
      <p>ご回答ありがとうございました。</p>
      <p style="font-size:.8rem;color:#7a7264;">結果は委員会で集計し、運営改善に役立てます。</p>
    </div>
  </div>

  <!-- ▼ パスワード画面（集計） -->
  <div id="pwView" class="hidden">
    <div class="pw-box">
      <p>委員会用集計画面のパスワードを入力してください</p>
      <input type="password" id="pwInput" maxlength="10">
      <button id="pwBtn">開く</button>
      <div class="err" id="pwErr"></div>
      <div class="footer-link"><button type="button" id="backFromPwBtn">回答画面に戻る</button></div>
    </div>
  </div>

  <!-- ▼ 集計結果画面 -->
  <div id="aggView" class="hidden">
    <div class="card">
      <div class="agg-toolbar">
        <select id="roundFilter"><option value="__all__">すべての実施回（累計）</option></select>
        <button id="reloadBtn" class="primary">再読込</button>
        <button id="exportBtn">Excelダウンロード</button>
      </div>
      <div class="total-line" id="totalLine"></div>
      <div id="aggTableWrap">読み込み中...</div>
      <div class="agg-note">黄色のセルは、回答が総数の35%以上を占めた項目です。</div>
    </div>
    <div class="footer-link">
      <button type="button" id="backFromAggBtn">回答画面に戻る</button>
    </div>
  </div>

</div>

<script>
// ==== 設定 ====
var GAS_URL = 'https://script.google.com/macros/s/AKfycbyECZk0qGV3KR7Nk98uFAOMAGy1JMaZVGi4iHCO1oIE-Y8ReKZVLy1KxOC7H35QTjA5Tw/exec';
var PASSWORD = '2408';

// ==== 設問データ（PDF「虐待の芽チェックリスト（入所施設版）」に準拠） ====
var QUESTIONS = [
  {n:1, text:'利用者に友達感覚で接したり、子供扱いしたりしていませんか？', opts:['している','していない','見たこと・聞いたことがある']},
  {n:2, text:'利用者に対して、アセスメント・施設サービス計画書に基づかず、あだ名や○○ちゃん呼び、呼び捨てなどをしていませんか？', opts:['している','していない','聞いたことがある']},
  {n:3, text:'利用者に対して、威圧的な態度、命令口調（「○○して」「ダメ！」など）で接していませんか？', opts:['している','していない','見たこと・聞いたことがある']},
  {n:4, text:'利用者への声掛けなしに介助したり、居室に入ったり、勝手に私物に触ったりしていませんか？', opts:['している','していない','見たことがある']},
  {n:5, text:'利用者のプライバシーに配慮せず、職員同士で話題にしたり個人情報を取り扱ったりしていませんか？', opts:['している','していない','聞いたことがある']},
  {n:6, text:'利用者に対して、「ちょっと待って」を乱用し、長時間待たせていませんか？', opts:['いる','いない','見たこと・聞いたことがある']},
  {n:7, text:'利用者に必要な日用品（眼鏡、義歯、補聴器など）や道具（コールボタンなど）が壊れていたり、使えなかったりしていませんか？', opts:['している','していない']},
  {n:8, text:'利用者の呼びかけやコールを無視したり、意見や訴えに否定的な態度をとったりしていませんか？', opts:['している','していない','見たことがある']},
  {n:9, text:'食事や入浴介助の無理強いなど、利用者に嫌悪感を抱かせるような援助を強要していませんか？', opts:['している','していない','見たことがある']},
  {n:10, text:'利用者の身体で遊んだり、人格を無視した関わり（落書きをする、くすぐるなど）をしたりしていませんか？', opts:['している','していない','見たことがある']},
  {n:11, text:'利用者や利用者の家族の言動をあざ笑ったり、悪口を言ったりしていませんか？', opts:['している','していない','聞いたことがある']},
  {n:12, text:'プライバシーへの配慮に欠けたケア（排泄について大声で話す、カーテンを開けたまま排泄ケアをするなど）をしていませんか？', opts:['している','していない','見たことがある']},
  {n:13, text:'利用者に対して乱暴で雑な介助や、いい加減な態度・受け答えをしていませんか？', opts:['している','していない','見たこと・聞いたことがある']},
  {n:14, text:'他の職員に仕事に関わる相談ができない等、職場でのコミュニケーションがとりにくくなっていませんか？', opts:['とりにくい','良好']},
  {n:15, text:'他の職員が行っているサービス提供・ケアに問題があると感じることがありませんか？', opts:['ある','ない']}
];

// ==== 回答フォーム構築 ====
var form = document.getElementById('checklistForm');
QUESTIONS.forEach(function(q){
  var block = document.createElement('div');
  block.className = 'card';
  var optsHtml = q.opts.map(function(o, idx){
    return '<label class="opt" data-q="'+q.n+'">'+
      '<input type="radio" name="q'+q.n+'" value="'+o+'" required>'+
      '<span>'+o+'</span></label>';
  }).join('');
  block.innerHTML = '<span class="qnum">問'+q.n+'</span>'+
    '<p class="qtext">'+q.text+'</p>'+
    '<div class="opts">'+optsHtml+'</div>';
  form.appendChild(block);
});

// 選択時のハイライト
form.addEventListener('change', function(e){
  if(e.target.type !== 'radio') return;
  var name = e.target.name;
  document.querySelectorAll('input[name="'+name+'"]').forEach(function(inp){
    inp.closest('.opt').classList.toggle('checked', inp.checked);
  });
});

// ==== 送信 ====
document.getElementById('submitBtn').addEventListener('click', function(){
  var missing = QUESTIONS.find(function(q){
    return !form.querySelector('input[name="q'+q.n+'"]:checked');
  });
  if(missing){
    alert('問'+missing.n+'に未回答があります。すべての設問にお答えください。');
    return;
  }
  var payload = { round: document.getElementById('roundInput').value || '' };
  QUESTIONS.forEach(function(q){
    payload['q'+q.n] = form.querySelector('input[name="q'+q.n+'"]:checked').value;
  });
  var btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '送信中...';
  fetch(GAS_URL, { method:'POST', body: JSON.stringify(payload) })
    .then(function(){
      document.getElementById('formView').classList.add('hidden');
      document.getElementById('thanksView').classList.remove('hidden');
    })
    .catch(function(){
      alert('送信に失敗しました。通信環境をご確認のうえ、もう一度お試しください。');
      btn.disabled = false; btn.textContent = '回答を送信する';
    });
});

// ==== 画面切り替え ====
function showView(id){
  ['formView','thanksView','pwView','aggView'].forEach(function(v){
    document.getElementById(v).classList.toggle('hidden', v !== id);
  });
}
document.getElementById('toAggBtn').addEventListener('click', function(){ showView('pwView'); });
document.getElementById('backFromPwBtn').addEventListener('click', function(){ showView('formView'); });
document.getElementById('backFromAggBtn').addEventListener('click', function(){ showView('formView'); });

document.getElementById('pwBtn').addEventListener('click', function(){
  var v = document.getElementById('pwInput').value;
  if(v === PASSWORD){
    document.getElementById('pwErr').textContent = '';
    showView('aggView');
    loadAggregation();
  } else {
    document.getElementById('pwErr').textContent = 'パスワードが違います。';
  }
});

// ==== 集計 ====
var allResponses = [];

function loadAggregation(){
  document.getElementById('aggTableWrap').textContent = '読み込み中...';
  fetch(GAS_URL)
    .then(function(r){ return r.json(); })
    .then(function(data){
      allResponses = data;
      populateRoundFilter(data);
      renderAggregation();
    })
    .catch(function(){
      document.getElementById('aggTableWrap').textContent = '読み込みに失敗しました。GAS_URLの設定をご確認ください。';
    });
}
document.getElementById('reloadBtn').addEventListener('click', loadAggregation);
document.getElementById('roundFilter').addEventListener('change', renderAggregation);

function populateRoundFilter(data){
  var sel = document.getElementById('roundFilter');
  var current = sel.value;
  sel.innerHTML = '<option value="__all__">すべての実施回（累計）</option>';
  var rounds = Array.from(new Set(data.map(function(d){ return d.round; }).filter(Boolean)));
  rounds.sort();
  rounds.forEach(function(r){
    var o = document.createElement('option');
    o.value = r; o.textContent = r;
    sel.appendChild(o);
  });
  if(rounds.indexOf(current) !== -1) sel.value = current;
}

function currentFiltered(){
  var round = document.getElementById('roundFilter').value;
  if(round === '__all__') return allResponses;
  return allResponses.filter(function(d){ return d.round === round; });
}

function renderAggregation(){
  var rows = currentFiltered();
  var total = rows.length;
  document.getElementById('totalLine').textContent = '回答数：' + total + '件';

  var maxOpts = Math.max.apply(null, QUESTIONS.map(function(q){ return q.opts.length; }));
  var thead = '<tr><th rowspan="2">No.</th><th rowspan="2">チェック項目</th>' +
    '<th colspan="'+maxOpts+'">回答（件数 / 割合）</th></tr>';

  var trs = QUESTIONS.map(function(q){
    var counts = q.opts.map(function(o){
      return rows.filter(function(r){ return r['q'+q.n] === o; }).length;
    });
    var cells = q.opts.map(function(o, i){
      var pct = total ? Math.round(counts[i] / total * 1000) / 10 : 0;
      var warn = total && pct >= 35;
      return '<td class="'+(warn?'warn':'')+'">'+o+'<br>'+counts[i]+'件（'+pct+'%）</td>';
    }).join('');
    // 選択肢数が少ない設問は空セルで埋める
    for(var i=q.opts.length;i<maxOpts;i++){ cells += '<td>―</td>'; }
    return '<tr><td>'+q.n+'</td><td class="qtext-cell">'+q.text+'</td>'+cells+'</tr>';
  }).join('');

  document.getElementById('aggTableWrap').innerHTML =
    '<table class="agg"><thead>'+thead+'</thead><tbody>'+trs+'</tbody></table>';
}

// ==== Excelエクスポート ====
document.getElementById('exportBtn').addEventListener('click', function(){
  var rows = currentFiltered();
  var total = rows.length;
  var sheetData = [['No.','チェック項目','選択肢','件数','割合(%)','35%以上']];
  QUESTIONS.forEach(function(q){
    q.opts.forEach(function(o){
      var count = rows.filter(function(r){ return r['q'+q.n] === o; }).length;
      var pct = total ? Math.round(count / total * 1000) / 10 : 0;
      sheetData.push([q.n, q.text, o, count, pct, (total && pct>=35) ? '★' : '']);
    });
  });
  var ws = XLSX.utils.aoa_to_sheet(sheetData);
  ws['!cols'] = [{wch:5},{wch:50},{wch:20},{wch:8},{wch:10},{wch:8}];
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '集計結果');
  var round = document.getElementById('roundFilter').value;
  var label = round === '__all__' ? '累計' : round;
  XLSX.writeFile(wb, '虐待の芽チェックリスト集計_' + label + '.xlsx');
});
</script>

</body>
</html>
