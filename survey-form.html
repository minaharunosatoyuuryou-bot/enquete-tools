<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レクリエーションアンケート</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: #f4f6f8;
    margin: 0;
    padding: 16px;
    color: #333;
  }
  .card {
    max-width: 560px;
    margin: 0 auto;
    background: #fff;
    border-radius: 12px;
    padding: 24px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  h1 { font-size: 20px; text-align: center; margin-bottom: 4px; }
  .sub { text-align: center; color: #777; font-size: 13px; margin-bottom: 24px; }
  .q { margin-bottom: 24px; }
  .q-title {
    font-weight: bold;
    font-size: 15px;
    margin-bottom: 10px;
    border-bottom: 2px solid #eee;
    padding-bottom: 6px;
  }
  label.opt {
    display: block;
    padding: 10px 12px;
    margin-bottom: 6px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
  }
  label.opt:active { background: #f0f0f0; }
  input[type="radio"], input[type="checkbox"] {
    margin-right: 8px;
    transform: scale(1.2);
  }
  input[type="text"], textarea, select {
    width: 100%;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 10px;
    font-size: 15px;
    font-family: inherit;
  }
  textarea { min-height: 90px; resize: vertical; }
  .other-input { margin-top: 6px; }
  button {
    width: 100%;
    padding: 14px;
    background: #2e7d5b;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
  }
  button:disabled { background: #aaa; }
  #status { text-align: center; margin-top: 14px; font-size: 14px; }
  #doneScreen { display: none; text-align: center; padding: 40px 10px; }
  #doneScreen .check { font-size: 48px; color: #2e7d5b; }
</style>
</head>
<body>
<div class="card">

  <div id="formScreen">
    <h1>レクリエーションアンケート</h1>
    <div class="sub">ご協力よろしくお願いします（所要時間 約1分）</div>

    <div class="q">
      <div class="q-title">所属施設</div>
      <select id="facility">
        <option value="">選択してください</option>
        <option value="悠久の里 一番館">悠久の里 一番館</option>
        <option value="悠久の里 二番館">悠久の里 二番館</option>
        <option value="悠久の里 三番館">悠久の里 三番館</option>
        <option value="悠久の里 横尾">悠久の里 横尾</option>
        <option value="悠久の里 佐伯">悠久の里 佐伯</option>
        <option value="悠久の里 米良">悠久の里 米良</option>
        <option value="みなはるの里">みなはるの里</option>
        <option value="みどりの郷ほんじょう">みどりの郷ほんじょう</option>
      </select>
    </div>

    <div class="q">
      <div class="q-title">① 良いと思うレクリエーション（いくつでも）</div>
      <label class="opt"><input type="checkbox" name="activities" value="魚釣り">魚釣り</label>
      <label class="opt"><input type="checkbox" name="activities" value="風船バレー">風船バレー</label>
      <label class="opt"><input type="checkbox" name="activities" value="宇宙人ゲーム">宇宙人ゲーム</label>
      <label class="opt"><input type="checkbox" name="activities" value="棒サッカー">棒サッカー</label>
      <label class="opt"><input type="checkbox" name="activities" value="おやつレク">おやつレク</label>
      <label class="opt"><input type="checkbox" name="activities" value="体操・運動系">体操・運動系</label>
      <label class="opt"><input type="checkbox" name="activities" value="手工芸・創作系">手工芸・創作系（塗り絵・貼り絵など）</label>
      <label class="opt"><input type="checkbox" name="activities" value="音楽・カラオケ">音楽・カラオケ</label>
      <div class="other-input">
        <input type="text" id="activitiesOther" placeholder="その他（自由記入）">
      </div>
    </div>

    <div class="q">
      <div class="q-title">② 年間行事の満足度</div>
      <label class="opt"><input type="radio" name="eventSatisfaction" value="とても満足している">とても満足している</label>
      <label class="opt"><input type="radio" name="eventSatisfaction" value="満足している">満足している</label>
      <label class="opt"><input type="radio" name="eventSatisfaction" value="どちらともいえない">どちらともいえない</label>
      <label class="opt"><input type="radio" name="eventSatisfaction" value="あまり満足していない">あまり満足していない</label>
      <label class="opt"><input type="radio" name="eventSatisfaction" value="満足していない">満足していない</label>
    </div>

    <div class="q">
      <div class="q-title">③ 貼り絵・制作活動の満足度</div>
      <label class="opt"><input type="radio" name="craftSatisfaction" value="とても満足している">とても満足している</label>
      <label class="opt"><input type="radio" name="craftSatisfaction" value="満足している">満足している</label>
      <label class="opt"><input type="radio" name="craftSatisfaction" value="どちらともいえない">どちらともいえない</label>
      <label class="opt"><input type="radio" name="craftSatisfaction" value="あまり満足していない">あまり満足していない</label>
      <label class="opt"><input type="radio" name="craftSatisfaction" value="満足していない">満足していない</label>
    </div>

    <div class="q">
      <div class="q-title">④ コンセプトレク（季節・テーマ企画）の満足度</div>
      <label class="opt"><input type="radio" name="conceptSatisfaction" value="とても満足している">とても満足している</label>
      <label class="opt"><input type="radio" name="conceptSatisfaction" value="満足している">満足している</label>
      <label class="opt"><input type="radio" name="conceptSatisfaction" value="どちらともいえない">どちらともいえない</label>
      <label class="opt"><input type="radio" name="conceptSatisfaction" value="あまり満足していない">あまり満足していない</label>
      <label class="opt"><input type="radio" name="conceptSatisfaction" value="満足していない">満足していない</label>
    </div>

    <div class="q">
      <div class="q-title">⑤ 今後やってほしいレクリエーション・ご要望</div>
      <textarea id="comment" placeholder="自由にご記入ください"></textarea>
    </div>

    <div class="q">
      <div class="q-title">⑥ レクの企画について</div>
      <label class="opt"><input type="radio" name="planningStyle" value="今の企画書(全施設共通)のままでよい">今の企画書（全施設共通）のままでよい</label>
      <label class="opt"><input type="radio" name="planningStyle" value="各施設ごとに企画を立てたほうがよい">各施設ごとに企画を立てたほうがよい</label>
      <label class="opt"><input type="radio" name="planningStyle" value="どちらともいえない">どちらともいえない</label>
    </div>

    <button id="submitBtn" onclick="submitForm()">回答を送信する</button>
    <div id="status"></div>
  </div>

  <div id="doneScreen">
    <div class="check">✓</div>
    <h1>送信しました</h1>
    <div class="sub">ご協力ありがとうございました</div>
  </div>

</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbyj-TD04uuQo9_buwmzJX6EJzifIddS0uXD11vPGSAfHUOaaAxA01DPgm-H3i1McFXLoQ/exec';

  function submitForm() {
    const btn = document.getElementById('submitBtn');
    const statusEl = document.getElementById('status');

    const facility = document.getElementById('facility').value;
    if (!facility) {
      statusEl.textContent = '所属施設を選択してください';
      statusEl.style.color = '#c0392b';
      return;
    }

    const activities = Array.from(document.querySelectorAll('input[name="activities"]:checked')).map(el => el.value);
    const activitiesOther = document.getElementById('activitiesOther').value.trim();
    const eventSatisfaction = document.querySelector('input[name="eventSatisfaction"]:checked');
    const craftSatisfaction = document.querySelector('input[name="craftSatisfaction"]:checked');
    const conceptSatisfaction = document.querySelector('input[name="conceptSatisfaction"]:checked');
    const planningStyle = document.querySelector('input[name="planningStyle"]:checked');
    const comment = document.getElementById('comment').value.trim();

    const payload = {
      formType: 'recreation',
      facility: facility,
      activities: activities,
      activitiesOther: activitiesOther,
      eventSatisfaction: eventSatisfaction ? eventSatisfaction.value : '',
      craftSatisfaction: craftSatisfaction ? craftSatisfaction.value : '',
      conceptSatisfaction: conceptSatisfaction ? conceptSatisfaction.value : '',
      planningStyle: planningStyle ? planningStyle.value : '',
      comment: comment
    };

    btn.disabled = true;
    btn.textContent = '送信中...';
    statusEl.textContent = '';

    fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    })
      .then(res => res.json())
      .then(data => {
        if (data.result === 'ok') {
          document.getElementById('formScreen').style.display = 'none';
          document.getElementById('doneScreen').style.display = 'block';
        } else {
          throw new Error(data.message || '送信エラー');
        }
      })
      .catch(err => {
        statusEl.textContent = '送信に失敗しました。もう一度お試しください。';
        statusEl.style.color = '#c0392b';
        btn.disabled = false;
        btn.textContent = '回答を送信する';
      });
  }
</script>
</body>
</html>
