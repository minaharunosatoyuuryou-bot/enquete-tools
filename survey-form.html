<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レクリエーションアンケート</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: #f4f6f8;
    margin: 0;
    padding: 16px;
    color: #333;
  }
  .card {
    max-width: 560px;
    margin: 0 auto;
    background: #fff;
    border-radius: 12px;
    padding: 24px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  h1 {
    font-size: 20px;
    text-align: center;
    margin-bottom: 4px;
  }
  .sub {
    text-align: center;
    color: #777;
    font-size: 13px;
    margin-bottom: 24px;
  }
  .q {
    margin-bottom: 24px;
  }
  .q-title {
    font-weight: bold;
    font-size: 15px;
    margin-bottom: 10px;
    border-bottom: 2px solid #eee;
    padding-bottom: 6px;
  }
  label.opt {
    display: block;
    padding: 10px 12px;
    margin-bottom: 6px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
  }
  label.opt:active { background: #f0f0f0; }
  input[type="radio"], input[type="checkbox"] {
    margin-right: 8px;
    transform: scale(1.2);
  }
  input[type="text"], textarea {
    width: 100%;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 10px;
    font-size: 15px;
    font-family: inherit;
  }
  textarea { min-height: 90px; resize: vertical; }
  .other-input { margin-top: 6px; }
  button {
    width: 100%;
    padding: 14px;
    background: #2e7d5b;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
  }
  button:disabled { background: #aaa; }
  #status {
    text-align: center;
    margin-top: 14px;
    font-size: 14px;
  }
  #doneScreen {
    display: none;
    text-align: center;
    padding: 40px 10px;
  }
  #doneScreen .check {
    font-size: 48px;
    color: #2e7d5b;
  }
</style>
</head>
<body>
<div class="card">

  <div id="formScreen">
    <h1>レクリエーションアンケート</h1>
    <div class="sub">ご協力よろしくお願いします（所要時間 約1分）</div>

    <div class="q">
      <div class="q-title">① 現在のレクリエーションの満足度はいかがですか？</div>
      <label class="opt"><input type="radio" name="satisfaction" value="とても満足している">とても満足している</label>
      <label class="opt"><input type="radio" name="satisfaction" value="満足している">満足している</label>
      <label class="opt"><input type="radio" name="satisfaction" value="どちらともいえない">どちらともいえない</label>
      <label class="opt"><input type="radio" name="satisfaction" value="あまり満足していない">あまり満足していない</label>
      <label class="opt"><input type="radio" name="satisfaction" value="満足していない">満足していない</label>
    </div>

    <div class="q">
      <div class="q-title">② 参加してみたい・続けたい活動（いくつでも）</div>
      <label class="opt"><input type="checkbox" name="activities" value="体操・運動系">体操・運動系（体操、ストレッチ、ウォーキングなど）</label>
      <label class="opt"><input type="checkbox" name="activities" value="手工芸・創作系">手工芸・創作系（塗り絵、折り紙、工作など）</label>
      <label class="opt"><input type="checkbox" name="activities" value="音楽・カラオケ">音楽・カラオケ（合唱、演奏鑑賞、カラオケなど）</label>
      <label class="opt"><input type="checkbox" name="activities" value="ゲーム・脳トレ">ゲーム・脳トレ（クイズ、麻雀、囲碁将棋など）</label>
      <label class="opt"><input type="checkbox" name="activities" value="季節行事">季節行事（お花見、七夕、クリスマス会など）</label>
      <label class="opt"><input type="checkbox" name="activities" value="外出・お出かけ">外出・お出かけ（散歩、買い物、ドライブなど）</label>
      <label class="opt"><input type="checkbox" name="activities" value="園芸・栽培">園芸・栽培（花植え、野菜づくりなど）</label>
      <div class="other-input">
        <input type="text" id="activitiesOther" placeholder="その他（自由記入）">
      </div>
    </div>

    <div class="q">
      <div class="q-title">③ 実施してほしい頻度</div>
      <label class="opt"><input type="radio" name="frequency" value="毎日">毎日</label>
      <label class="opt"><input type="radio" name="frequency" value="週に2〜3回程度">週に2〜3回程度</label>
      <label class="opt"><input type="radio" name="frequency" value="週に1回程度">週に1回程度</label>
      <label class="opt"><input type="radio" name="frequency" value="月に数回程度">月に数回程度</label>
    </div>

    <div class="q">
      <div class="q-title">④ 実施してほしい時間帯</div>
      <label class="opt"><input type="radio" name="timeOfDay" value="午前中">午前中</label>
      <label class="opt"><input type="radio" name="timeOfDay" value="昼食後">昼食後</label>
      <label class="opt"><input type="radio" name="timeOfDay" value="午後">午後</label>
      <label class="opt"><input type="radio" name="timeOfDay" value="夕方">夕方</label>
    </div>

    <div class="q">
      <div class="q-title">⑤ ご意見・ご要望など</div>
      <textarea id="comment" placeholder="自由にご記入ください"></textarea>
    </div>

    <button id="submitBtn" onclick="submitForm()">回答を送信する</button>
    <div id="status"></div>
  </div>

  <div id="doneScreen">
    <div class="check">✓</div>
    <h1>送信しました</h1>
    <div class="sub">ご協力ありがとうございました</div>
  </div>

</div>

<script>
  // ここにデプロイしたGASのURL（.../exec）を貼り付けてください
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbyj-TD04uuQo9_buwmzJX6EJzifIddS0uXD11vPGSAfHUOaaAxA01DPgm-H3i1McFXLoQ/exec';

  function submitForm() {
    const btn = document.getElementById('submitBtn');
    const statusEl = document.getElementById('status');

    const satisfaction = document.querySelector('input[name="satisfaction"]:checked');
    if (!satisfaction) {
      statusEl.textContent = '①満足度を選択してください';
      statusEl.style.color = '#c0392b';
      return;
    }

    const activities = Array.from(document.querySelectorAll('input[name="activities"]:checked')).map(el => el.value);
    const activitiesOther = document.getElementById('activitiesOther').value.trim();
    const frequency = document.querySelector('input[name="frequency"]:checked');
    const timeOfDay = document.querySelector('input[name="timeOfDay"]:checked');
    const comment = document.getElementById('comment').value.trim();

    const payload = {
      formType: 'recreation',
      satisfaction: satisfaction.value,
      activities: activities,
      activitiesOther: activitiesOther,
      frequency: frequency ? frequency.value : '',
      timeOfDay: timeOfDay ? timeOfDay.value : '',
      comment: comment
    };

    btn.disabled = true;
    btn.textContent = '送信中...';
    statusEl.textContent = '';

    fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    })
      .then(res => res.json())
      .then(data => {
        if (data.result === 'ok') {
          document.getElementById('formScreen').style.display = 'none';
          document.getElementById('doneScreen').style.display = 'block';
        } else {
          throw new Error(data.message || '送信エラー');
        }
      })
      .catch(err => {
        statusEl.textContent = '送信に失敗しました。もう一度お試しください。';
        statusEl.style.color = '#c0392b';
        btn.disabled = false;
        btn.textContent = '回答を送信する';
      });
  }
</script>
</body>
</html>
