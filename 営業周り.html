
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>営業周り | 大分高齢者紹介センター</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F4EE;
    --paper:#FFFFFF;
    --line:#E3DECF;
    --navy:#1F3A54;
    --navy-deep:#152A3D;
    --amber:#C9902E;
    --amber-deep:#A8761F;
    --text:#2B2A26;
    --text-soft:#6B6A63;
    --k-houkatsu:#3B6EA5;
    --k-kyotaku:#4C8C63;
    --k-roken:#C9902E;
    --k-byoin:#B14C4C;
    --danger:#B14C4C;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Noto Sans JP","Hiragino Sans",sans-serif;background:var(--bg);color:var(--text);}
  h1,h2,h3,.brand,.kpi-num{font-family:"Zen Kaku Gothic New","Noto Sans JP",sans-serif;}
  button{font-family:inherit;}

  /* ---------- Login ---------- */
  #loginScreen{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(160deg,var(--navy-deep) 0%, var(--navy) 55%, #2C4F6E 100%);
    padding:24px;
  }
  .login-card{
    background:var(--paper);border-radius:20px;padding:36px 28px;width:100%;max-width:360px;
    box-shadow:0 20px 60px rgba(0,0,0,.35);text-align:center;
  }
  .login-card .mark{
    width:56px;height:56px;border-radius:14px;background:var(--amber);margin:0 auto 16px;
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px;font-weight:900;
  }
  .login-card h1{font-size:20px;margin:0 0 4px;color:var(--navy-deep);}
  .login-card p{font-size:13px;color:var(--text-soft);margin:0 0 22px;}
  .login-card input{
    width:100%;padding:14px 16px;border-radius:10px;border:1.5px solid var(--line);font-size:16px;
    text-align:center;letter-spacing:4px;margin-bottom:14px;
  }
  .login-card button{
    width:100%;padding:14px;border:none;border-radius:10px;background:var(--amber);color:#fff;
    font-weight:700;font-size:15px;cursor:pointer;transition:.15s;
  }
  .login-card button:hover{background:var(--amber-deep);}
  .login-err{color:var(--danger);font-size:12px;height:16px;margin-top:8px;}

  /* ---------- App shell ---------- */
  #app{display:none;min-height:100vh;padding-bottom:70px;}
  header.top{
    background:var(--navy-deep);color:#fff;padding:16px 18px 46px;position:relative;
  }
  header.top .brand{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px;}
  header.top .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--amber);}
  header.top .brand .pw-gear{
    margin-left:auto;background:rgba(255,255,255,.12);border:none;color:#fff;width:28px;height:28px;
    border-radius:8px;font-size:14px;cursor:pointer;
  }
  header.top .sub{font-size:11px;color:#B9C6D3;margin-top:2px;}

  .kpi-bar{
    display:flex;gap:10px;margin:-32px 14px 0;position:relative;z-index:2;
  }
  .kpi{
    flex:1;background:var(--paper);border-radius:var(--radius);padding:12px 10px;text-align:center;
    box-shadow:0 6px 18px rgba(31,58,84,.10);
  }
  .kpi-num{font-size:22px;font-weight:900;color:var(--navy-deep);}
  .kpi-label{font-size:10.5px;color:var(--text-soft);margin-top:2px;}
  .kpi.overdue .kpi-num{color:var(--danger);}

  .tabs{display:flex;gap:6px;margin:16px 14px 8px;background:#EAE6D8;border-radius:12px;padding:4px;}
  .tabs button{
    flex:1;padding:10px 0;border:none;border-radius:9px;background:transparent;color:var(--text-soft);
    font-weight:700;font-size:13.5px;cursor:pointer;
  }
  .tabs button.active{background:var(--navy-deep);color:#fff;}

  .filters{display:flex;gap:8px;margin:0 14px 10px;flex-wrap:wrap;}
  .filters select, .filters input[type=text]{
    padding:9px 10px;border-radius:9px;border:1.3px solid var(--line);background:var(--paper);
    font-size:12.5px;color:var(--text);flex:1 1 auto;min-width:86px;
  }
  .filters input[type=text]{flex:2 1 160px;}

  .nearby-btn{
    padding:9px 14px;border-radius:9px;border:1.3px solid var(--navy);background:var(--paper);
    color:var(--navy-deep);font-size:12.5px;font-weight:700;cursor:pointer;flex:1 1 auto;
  }
  .nearby-btn.active{background:var(--navy-deep);color:#fff;border-color:var(--navy-deep);}
  .card-dist{color:var(--navy);font-weight:700;}

  #listView{margin:0 14px;}

  .city-group{margin:14px 0 4px;font-size:12.5px;font-weight:700;color:var(--navy);
    display:flex;align-items:center;gap:8px;}
  .city-group::after{content:"";flex:1;height:1px;background:var(--line);}

  .card{
    background:var(--paper);border-radius:var(--radius);padding:13px 14px;margin-bottom:9px;
    border:1px solid var(--line);cursor:pointer;transition:.12s;
  }
  .card:active{transform:scale(.985);}
  .card.overdue{border-color:var(--danger);background:#FBF1F0;}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .badge{
    font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:20px;color:#fff;white-space:nowrap;
  }
  .badge.包括{background:var(--k-houkatsu);}
  .badge.居宅{background:var(--k-kyotaku);}
  .badge.老健{background:var(--k-roken);}
  .badge.病院{background:var(--k-byoin);}
  .card-name{font-size:14.5px;font-weight:700;margin:6px 0 3px;line-height:1.4;}
  .card-addr{font-size:12px;color:var(--text-soft);line-height:1.5;}
  .card-meta{display:flex;justify-content:space-between;margin-top:9px;font-size:11.5px;}
  .card-meta .rep{color:var(--text-soft);}
  .card-meta .visit-status{font-weight:700;}
  .visit-status.none{color:var(--text-soft);}
  .visit-status.done{color:var(--k-kyotaku);}
  .visit-status.overdue{color:var(--danger);}
  .visit-status.upcoming{color:var(--amber-deep);}

  .empty{text-align:center;color:var(--text-soft);font-size:13px;padding:40px 10px;}

  /* ---------- Modal (施設訪問側) ---------- */
  .overlay{
    display:none;position:fixed;inset:0;background:rgba(21,42,61,.55);z-index:50;
    align-items:flex-end;justify-content:center;
  }
  .overlay.show{display:flex;}
  .sheet{
    background:var(--paper);width:100%;max-width:480px;border-radius:20px 20px 0 0;
    max-height:88vh;overflow-y:auto;padding:20px 20px 26px;position:relative;
  }
  .sheet-handle{width:38px;height:4px;background:var(--line);border-radius:3px;margin:0 auto 14px;}
  .sheet h2{font-size:17px;margin:0 0 2px;}
  .sheet .addr{font-size:12.5px;color:var(--text-soft);margin-bottom:12px;}
  .sheet .maplink{font-size:12px;color:var(--navy);text-decoration:none;font-weight:700;}
  .divider{height:1px;background:var(--line);margin:14px 0;}
  .hist-item{padding:10px 0;border-bottom:1px dashed var(--line);font-size:12.5px;}
  .hist-item:last-child{border-bottom:none;}
  .hist-date{font-weight:700;color:var(--navy-deep);}
  .hist-rep{color:var(--text-soft);margin-left:6px;}
  .hist-memo{margin-top:3px;white-space:pre-wrap;}
  .hist-next{margin-top:4px;font-size:11.5px;color:var(--amber-deep);font-weight:700;}
  .del-btn{float:right;color:var(--danger);background:none;border:none;font-size:11px;cursor:pointer;}

  .form-row{margin-bottom:12px;}
  .form-row label{display:block;font-size:11.5px;font-weight:700;color:var(--text-soft);margin-bottom:5px;}
  .form-row input, .form-row select, .form-row textarea{
    width:100%;padding:11px 12px;border-radius:9px;border:1.3px solid var(--line);font-size:14px;font-family:inherit;
  }
  .form-row textarea{resize:vertical;min-height:70px;}
  .save-btn{
    width:100%;padding:14px;background:var(--amber);color:#fff;border:none;border-radius:10px;
    font-weight:700;font-size:14.5px;cursor:pointer;margin-top:4px;
  }
  .save-btn:hover{background:var(--amber-deep);}
  .save-btn:disabled{background:#C9BFA8;}
  .close-btn{
    position:absolute;top:16px;right:18px;background:none;border:none;font-size:20px;color:var(--text-soft);cursor:pointer;
  }

  .rep-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
  .rep-chip{
    display:inline-flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--line);
    border-radius:20px;padding:5px 8px 5px 12px;font-size:12.5px;color:var(--text);
  }
  .rep-chip button{
    background:var(--line);border:none;border-radius:50%;width:18px;height:18px;color:var(--text);
    font-size:11px;cursor:pointer;line-height:1;
  }
  .rep-add-row{display:flex;gap:8px;}
  .rep-add-row input{
    flex:1;padding:10px 12px;border-radius:9px;border:1.3px solid var(--line);font-size:13.5px;
  }
  .rep-add-btn{
    padding:0 16px;border-radius:9px;border:none;background:var(--navy-deep);color:#fff;font-weight:700;
    font-size:13px;cursor:pointer;
  }

  .month-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:11px;font-size:12.5px;}
  .month-bar-label{width:76px;flex-shrink:0;color:var(--text-soft);}
  .month-bar-track{flex:1;background:var(--bg);border-radius:6px;height:14px;overflow:hidden;}
  .month-bar-fill{height:100%;background:var(--navy);border-radius:6px;}
  .month-bar-value{width:120px;flex-shrink:0;text-align:right;font-weight:700;color:var(--navy-deep);white-space:nowrap;}

  .geo-toast{
    position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:var(--navy-deep);color:#fff;
    padding:9px 16px;border-radius:20px;font-size:11.5px;z-index:60;box-shadow:0 6px 16px rgba(0,0,0,.25);
    display:none;
  }
  .toast{
    position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:var(--k-kyotaku);color:#fff;
    padding:10px 20px;border-radius:20px;font-size:12.5px;z-index:70;box-shadow:0 6px 16px rgba(0,0,0,.25);
    display:none;
  }

  /* ================= 案件管理セクション（元 営業記録.html を移植・dl- プレフィックス） ================= */
  #dealSection{
    --dl-accent:#2563c4; --dl-accent-light:#dbeafe; --dl-green:#16a34a; --dl-green-light:#dcfce7;
    --dl-red:#dc2626; --dl-yellow:#d97706; --dl-yellow-light:#fef3c7; --dl-gray-light:#e5e7eb;
    --dl-surface:#ffffff; --dl-surface2:#f7f9fc; --dl-border:#dde3ec; --dl-shadow:0 1px 4px rgba(0,0,0,0.08);
    padding:0 14px 20px; font-size:13px;
  }
  .dl-summary{ display:flex; gap:10px; margin:14px 0 12px; flex-wrap:wrap; }
  .dl-card{ background:var(--dl-surface); border-radius:10px; padding:12px 10px; box-shadow:var(--dl-shadow); flex:1; min-width:88px; text-align:center; }
  .dl-card .dl-num{ font-size:20px; font-weight:700; color:var(--navy-deep); }
  .dl-card .dl-label{ font-size:10.5px; color:var(--text-soft); margin-top:2px; }
  .dl-card.dl-alert .dl-num{ color:var(--dl-red); }
  .dl-card.dl-success .dl-num{ color:var(--dl-green); }
  .dl-card.dl-warn .dl-num{ color:var(--dl-yellow); }
  .dl-sync-row{ font-size:11px; color:var(--text-soft); margin-bottom:10px; text-align:right; }
  .dl-month-tabs-wrap{ background:var(--dl-surface); border-radius:10px; box-shadow:var(--dl-shadow); margin-bottom:10px; padding:8px 10px 0; overflow-x:auto; }
  .dl-month-tabs{ display:flex; gap:4px; min-width:max-content; border-bottom:2px solid var(--dl-border); }
  .dl-month-tab{ padding:7px 12px; font-size:12px; font-weight:600; cursor:pointer; border:none; background:none; color:var(--text-soft); border-bottom:3px solid transparent; margin-bottom:-2px; white-space:nowrap; }
  .dl-month-tab.active{ color:var(--dl-accent); border-bottom-color:var(--dl-accent); }
  .dl-month-tab .dl-tab-cnt{ display:inline-block; background:var(--dl-gray-light); color:var(--text-soft); font-size:10px; font-weight:700; padding:1px 5px; border-radius:8px; margin-left:4px; }
  .dl-month-tab.active .dl-tab-cnt{ background:var(--dl-accent-light); color:var(--dl-accent); }
  .dl-toolbar{ background:var(--dl-surface); border-radius:10px; padding:10px 12px; box-shadow:var(--dl-shadow); margin-bottom:10px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .dl-toolbar input, .dl-toolbar select{ border:1px solid var(--dl-border); border-radius:6px; padding:6px 9px; font-size:12px; background:var(--dl-surface2); color:var(--text); height:32px; }
  .dl-toolbar input{ flex:1; min-width:140px; }
  .dl-btn{ padding:6px 13px; border-radius:6px; border:none; cursor:pointer; font-size:12px; font-weight:600; height:32px; white-space:nowrap; }
  .dl-btn-primary{ background:var(--dl-accent); color:#fff; }
  .dl-btn-success{ background:var(--dl-green); color:#fff; }
  .dl-btn-outline{ background:transparent; border:1px solid var(--dl-border); color:var(--text-soft); }
  .dl-table-wrap{ background:var(--dl-surface); border-radius:10px; box-shadow:var(--dl-shadow); overflow:auto; }
  .dl-table-wrap table{ width:100%; border-collapse:collapse; }
  .dl-table-wrap thead th{ background:var(--dl-accent); color:#fff; padding:8px 9px; font-size:11px; font-weight:600; text-align:left; white-space:nowrap; position:sticky; top:0; }
  .dl-table-wrap tbody tr{ border-bottom:1px solid var(--dl-border); }
  .dl-table-wrap tbody tr:hover{ background:#f0f6ff; }
  .dl-table-wrap td{ padding:8px 9px; vertical-align:middle; white-space:nowrap; }
  .dl-alert-row{ background:#fff5f5 !important; }
  .dl-alert-row:hover{ background:#ffe4e4 !important; }
  .dl-alert-badge{ display:inline-block; background:var(--dl-red); color:#fff; font-size:10px; font-weight:700; padding:2px 6px; border-radius:10px; margin-left:4px; }
  .dl-status{ display:inline-block; padding:3px 8px; border-radius:10px; font-size:11px; font-weight:600; cursor:pointer; }
  .dl-s-active{ background:var(--dl-accent-light); color:var(--dl-accent); }
  .dl-s-success{ background:var(--dl-green-light); color:var(--dl-green); }
  .dl-s-lost{ background:var(--dl-gray-light); color:var(--text-soft); }
  .dl-s-hold{ background:var(--dl-yellow-light); color:var(--dl-yellow); }
  .dl-care{ display:inline-block; padding:2px 7px; border-radius:4px; font-size:11px; font-weight:700; background:#e0e7ff; color:#3730a3; }
  .dl-date-overdue{ color:var(--dl-red); font-weight:700; }
  .dl-action-btns{ display:flex; gap:4px; }
  .dl-btn-icon{ border:none; background:none; cursor:pointer; padding:4px 6px; border-radius:4px; font-size:13px; line-height:1; }
  .dl-btn-icon:hover{ background:var(--dl-surface2); }
  .dl-modal-bg{ display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.4); z-index:100; align-items:center; justify-content:center; }
  .dl-modal-bg.open{ display:flex; }
  .dl-modal{ background:var(--dl-surface); border-radius:12px; padding:22px; width:480px; max-width:92vw; max-height:88vh; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,0.18); }
  .dl-modal h2{ font-size:15px; margin-bottom:14px; color:var(--dl-accent); }
  .dl-form-row{ margin-bottom:11px; }
  .dl-form-row label{ display:block; font-size:11px; font-weight:600; color:var(--text-soft); margin-bottom:4px; }
  .dl-form-row input, .dl-form-row select, .dl-form-row textarea{ width:100%; border:1px solid var(--dl-border); border-radius:6px; padding:7px 9px; font-size:13px; background:var(--dl-surface2); color:var(--text); font-family:inherit; }
  .dl-form-row textarea{ resize:vertical; min-height:56px; }
  .dl-form-2col{ display:grid; grid-template-columns:1fr 1fr; gap:9px; }
  .dl-modal-footer{ display:flex; gap:8px; justify-content:flex-end; margin-top:14px; }
  .dl-empty{ text-align:center; padding:36px; color:var(--text-soft); }
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="loginScreen">
  <div class="login-card">
    <div class="mark">診</div>
    <h1>営業周り</h1>
    <p>大分高齢者紹介センター 訪問管理</p>
    <input type="password" id="pwInput" inputmode="numeric" maxlength="8" placeholder="パスワード">
    <button onclick="tryLogin()">開く</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- メイン画面 -->
<div id="app">
  <header class="top">
    <div class="brand"><span class="dot"></span>営業周り<button class="pw-gear" onclick="openPwChange()" title="パスワードを変更">⚙</button></div>
    <div class="sub">大分高齢者紹介センター ／ 施設訪問・案件管理</div>
  </header>

  <div class="kpi-bar" id="visitKpiBar">
    <div class="kpi"><div class="kpi-num" id="kpiTotal">-</div><div class="kpi-label">対象施設</div></div>
    <div class="kpi"><div class="kpi-num" id="kpiVisited">-</div><div class="kpi-label">今月訪問済</div></div>
    <div class="kpi overdue"><div class="kpi-num" id="kpiOverdue">-</div><div class="kpi-label">要フォロー</div></div>
  </div>

  <div class="tabs">
    <button id="mainTabVisit" class="active" onclick="switchMainTab('visit')">施設訪問</button>
    <button id="mainTabDeal" onclick="switchMainTab('deal')">案件管理</button>
  </div>

  <!-- ============ 施設訪問セクション ============ -->
  <div id="visitSection">
    <div class="filters">
      <input type="text" id="fSearch" placeholder="施設名で検索" oninput="renderAll()">
      <select id="fCity" onchange="renderAll()"><option value="">市区町村：すべて</option></select>
      <select id="fKind" onchange="renderAll()">
        <option value="">種別：すべて</option>
        <option value="包括">包括</option><option value="居宅">居宅</option>
        <option value="老健">老健</option><option value="病院">病院</option>
      </select>
      <select id="fRep" onchange="renderAll()"><option value="">担当者：すべて</option></select>
      <select id="fStatus" onchange="renderAll()">
        <option value="">状態：すべて</option>
        <option value="overdue">要フォロー</option>
        <option value="upcoming">次回予定あり</option>
        <option value="none">未訪問</option>
      </select>
    </div>

    <div class="filters" id="nearbyBar">
      <button id="nearbyBtn" class="nearby-btn" onclick="toggleNearby()">📍 現在地から絞り込む</button>
      <select id="fRadius" onchange="renderAll()" style="display:none;">
        <option value="3">3km以内</option>
        <option value="5" selected>5km以内</option>
        <option value="10">10km以内</option>
        <option value="30">30km以内</option>
      </select>
      <button id="monthlyBtn" class="nearby-btn" onclick="openMonthly()">📊 月別実績を見る</button>
    </div>

    <div id="listView"></div>
  </div>

  <!-- ============ 案件管理セクション ============ -->
  <div id="dealSection" style="display:none;">
    <div class="dl-sync-row" id="dl-sync-status">読み込み中...</div>
    <div class="dl-summary">
      <div class="dl-card"><div class="dl-num" id="dl-cnt-all">—</div><div class="dl-label">総件数</div></div>
      <div class="dl-card dl-warn"><div class="dl-num" id="dl-cnt-active">—</div><div class="dl-label">商談中</div></div>
      <div class="dl-card dl-alert"><div class="dl-num" id="dl-cnt-alert">—</div><div class="dl-label">⚠未対応7日超</div></div>
      <div class="dl-card dl-success"><div class="dl-num" id="dl-cnt-success">—</div><div class="dl-label">成約</div></div>
      <div class="dl-card"><div class="dl-num" id="dl-cnt-lost">—</div><div class="dl-label">失注</div></div>
    </div>
    <div class="dl-month-tabs-wrap"><div class="dl-month-tabs" id="dl-month-tabs"></div></div>
    <div class="dl-toolbar">
      <input type="text" id="dl-search" placeholder="🔍 氏名・施設・担当者で検索">
      <select id="dl-filter-status">
        <option value="">ステータス 全て</option>
        <option value="商談中">商談中</option><option value="成約">成約</option>
        <option value="失注">失注</option><option value="保留">保留</option>
      </select>
      <select id="dl-filter-care">
        <option value="">介護度 全て</option>
        <option value="要支援1">要支援1</option><option value="要支援2">要支援2</option>
        <option value="要介護1">要介護1</option><option value="要介護2">要介護2</option>

<script>
/* ============ 設定 ============
   施設訪問データ用 GAS（施設マスタ・訪問記録・設定シート）      */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxYLjGt7vlDkNylFRyD-_0ubXDkO4DCyukmlwsM8XkeHGdIZsMITaCvHpzBcv-s1vtq/exec';
/* 案件管理データ用 GAS（既存の「営業記録」バックエンド。変更なしでそのまま利用） */
const DEAL_GAS_URL = 'https://script.google.com/macros/s/AKfycbzvfCyfMX-xd862m77B1jNhJMQkDc6nv0iBd8UVGvyblooyL8UwtNR5yF2U87ZhZRzd/exec';
let currentPassword = null; // ログイン成功時のパスワードを保持（書き込み系リクエストで使用）
/* ============================== */

let facilities = [];
let visits = [];
let repList = [];
let repListDraft = [];
let currentFacilityId = null;
const KIND_COLOR = {'包括':'#3B6EA5','居宅':'#4C8C63','老健':'#C9902E','病院':'#B14C4C'};
let userLoc = null; // {lat, lng}
let nearbyActive = false;
let mainTab = 'visit';
let dealLoaded = false;

function distanceKm(lat1, lng1, lat2, lng2){
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLng = (lng2-lng1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function getCurrentPosition(){
  return new Promise((resolve, reject)=>{
    if(!navigator.geolocation){ reject(new Error('この端末は位置情報に対応していません')); return; }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({lat: pos.coords.latitude, lng: pos.coords.longitude}),
      err => reject(err),
      {enableHighAccuracy:true, timeout:10000}
    );
  });
}

async function toggleNearby(){
  const btn = document.getElementById('nearbyBtn');
  const radiusSel = document.getElementById('fRadius');
  if(nearbyActive){
    nearbyActive = false;
    btn.classList.remove('active');
    btn.textContent = '📍 現在地から絞り込む';
    radiusSel.style.display = 'none';
    renderAll();
    return;
  }
  btn.textContent = '取得中...';
  try{
    userLoc = await getCurrentPosition();
    nearbyActive = true;
    btn.classList.add('active');
    btn.textContent = '📍 現在地から絞り込み中';
    radiusSel.style.display = 'inline-block';
    renderAll();
  }catch(err){
    showToast('位置情報を取得できませんでした（設定でブラウザの位置情報を許可してください）');
    btn.textContent = '📍 現在地から絞り込む';
    console.error(err);
  }
}

function switchMainTab(tab){
  mainTab = tab;
  document.getElementById('mainTabVisit').classList.toggle('active', tab==='visit');
  document.getElementById('mainTabDeal').classList.toggle('active', tab==='deal');
  document.getElementById('visitKpiBar').style.display = tab==='visit' ? 'flex':'none';
  document.getElementById('visitSection').style.display = tab==='visit' ? 'block':'none';
  document.getElementById('dealSection').style.display = tab==='deal' ? 'block':'none';
  if(tab==='deal' && !dealLoaded){
    dealLoaded = true;
    dealLoadAll();
  }
}

async function tryLogin(){
  const v = document.getElementById('pwInput').value;
  const btn = document.querySelector('.login-card button');
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';
  if(GAS_URL.indexOf('PASTE_YOUR') === 0){
    errEl.textContent = 'GAS_URLが未設定です';
    return;
  }
  btn.disabled = true; btn.textContent = '確認中...';
  try{
    const res = await fetch(GAS_URL + '?action=checkLogin&pw=' + encodeURIComponent(v));
    const data = await res.json();
    if(data.ok){
      currentPassword = v;
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('app').style.display='block';
      boot();
    } else {
      errEl.textContent = 'パスワードが違います';
    }
  }catch(err){
    errEl.textContent = '通信エラーが発生しました';
    console.error(err);
  }
  btn.disabled = false; btn.textContent = '開く';
}
document.getElementById('pwInput').addEventListener('keydown', e=>{ if(e.key==='Enter') tryLogin(); });

async function boot(){
  if(GAS_URL.indexOf('PASTE_YOUR') === 0){
    document.getElementById('listView').innerHTML =
      '<div class="empty">⚠ GAS_URL が未設定です。<br>営業周り.html 内の GAS_URL を、デプロイしたウェブアプリURLに書き換えてください。</div>';
    return;
  }
  await loadData();
  populateFilterOptions();
  renderAll();
  processGeocodeQueue();
}

async function loadData(){
  try{
    const res = await fetch(GAS_URL + '?action=getData');
    const data = await res.json();
    facilities = data.facilities || [];
    visits = data.visits || [];
    repList = data.reps && data.reps.length ? data.reps : ['牧','岡野','岩矢','木﨑','高田'];
  }catch(err){
    showToast('データ取得に失敗しました');
    console.error(err);
  }
}

function populateFilterOptions(){
  const cities = [...new Set(facilities.map(f=>f.city))];
  const repsFromFacilities = [...new Set(facilities.map(f=>f.rep))];
  const cSel = document.getElementById('fCity');
  cities.forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c; cSel.appendChild(o); });
  const rSel = document.getElementById('fRep');
  repsFromFacilities.forEach(r=>{ const o=document.createElement('option'); o.value=r; o.textContent=r; rSel.appendChild(o); });
  populateVRepSelect();
  populateDealStaffOptions();
}

function populateVRepSelect(){
  const sel = document.getElementById('vRep');
  sel.innerHTML = '';
  repList.forEach(r=>{ const o=document.createElement('option'); o.value=r; o.textContent=r; sel.appendChild(o); });
  const other = document.createElement('option'); other.value='その他'; other.textContent='その他';
  sel.appendChild(other);
}

function populateDealStaffOptions(){
  const dl = document.getElementById('repDatalist');
  if(!dl) return;
  dl.innerHTML = repList.map(r=>'<option value="'+escapeHtml(r)+'">').join('');
}

function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function thisMonthPrefix(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}

function visitsFor(facilityId){
  return visits.filter(v=>v.facilityId===facilityId).sort((a,b)=> a.visitDate < b.visitDate ? 1 : -1);
}

function statusFor(facilityId){
  const vs = visitsFor(facilityId);
  if(vs.length===0) return {status:'none', last:null, next:null};
  const last = vs[0];
  const next = last.nextVisit || null;
  const today = todayStr();
  if(next && next < today) return {status:'overdue', last:last.visitDate, next:next};
  if(next && next >= today) return {status:'upcoming', last:last.visitDate, next:next};
  return {status:'done', last:last.visitDate, next:null};
}

function getFiltered(){
  const search = document.getElementById('fSearch').value.trim();
  const city = document.getElementById('fCity').value;
  const kind = document.getElementById('fKind').value;
  const rep = document.getElementById('fRep').value;
  const status = document.getElementById('fStatus').value;

  let result = facilities.filter(f=>{
    if(search && !f.name.includes(search)) return false;
    if(city && f.city!==city) return false;
    if(kind && f.kind!==kind) return false;
    if(rep && f.rep!==rep) return false;
    if(status){
      const st = statusFor(f.id).status;
      if(status==='overdue' && st!=='overdue') return false;
      if(status==='upcoming' && st!=='upcoming') return false;
      if(status==='none' && st!=='none') return false;
    }
    return true;
  });

  if(nearbyActive && userLoc){
    const radiusKm = Number(document.getElementById('fRadius').value);
    result = result
      .filter(f=>f.lat && f.lng)
      .map(f=>{ f.__dist = distanceKm(userLoc.lat, userLoc.lng, f.lat, f.lng); return f; })
      .filter(f=>f.__dist <= radiusKm)
      .sort((a,b)=>a.__dist-b.__dist);
  }
  return result;
}

function renderAll(){
  renderKpi();
  renderList();
}

function renderKpi(){
  const monthPre = thisMonthPrefix();
  const visitedThisMonth = new Set(
    visits.filter(v=>v.visitDate && v.visitDate.startsWith(monthPre)).map(v=>v.facilityId)
  ).size;
  const overdueCount = facilities.filter(f=>statusFor(f.id).status==='overdue').length;
  document.getElementById('kpiTotal').textContent = facilities.length;
  document.getElementById('kpiVisited').textContent = visitedThisMonth;
  document.getElementById('kpiOverdue').textContent = overdueCount;
}

function renderList(){
  const list = getFiltered();
  const container = document.getElementById('listView');
  if(list.length===0){
    container.innerHTML = '<div class="empty">' + (nearbyActive ? 'この範囲内に施設がありません' : '該当する施設がありません') + '</div>';
    return;
  }

  if(nearbyActive){
    let html = '<div class="city-group">現在地から近い順（'+list.length+'）</div>';
    list.forEach(f=>{
      const st = statusFor(f.id);
      let statusLabel = '未訪問';
      let statusClass = 'none';
      if(st.status==='done'){ statusLabel='前回 '+st.last; statusClass='done'; }
      if(st.status==='upcoming'){ statusLabel='次回予定 '+st.next; statusClass='upcoming'; }
      if(st.status==='overdue'){ statusLabel='期限超過 '+st.next; statusClass='overdue'; }
      html += '<div class="card '+(st.status==='overdue'?'overdue':'')+'" onclick="openDetail(\''+f.id+'\')">'
        + '<div class="card-top"><span class="badge '+f.kind+'">'+f.kind+'</span><span class="card-dist">'+f.__dist.toFixed(1)+'km</span></div>'
        + '<div class="card-name">'+f.name+'</div>'
        + '<div class="card-addr">'+f.addr+'</div>'
        + '<div class="card-meta"><span class="rep">担当：'+f.rep+'</span><span class="visit-status '+statusClass+'">'+statusLabel+'</span></div>'
        + '</div>';
    });
    container.innerHTML = html;
    return;
  }

  const rank = {overdue:0, upcoming:1, none:2, done:3};
  const byCity = {};
  list.forEach(f=>{ (byCity[f.city] = byCity[f.city]||[]).push(f); });

  let html = '';
  Object.keys(byCity).sort().forEach(city=>{
    const items = byCity[city].slice().sort((a,b)=>{
      const sa = statusFor(a.id), sb = statusFor(b.id);
      return rank[sa.status]-rank[sb.status];
    });
    html += '<div class="city-group">'+city+'（'+items.length+'）</div>';
    items.forEach(f=>{
      const st = statusFor(f.id);
      let statusLabel = '未訪問';
      let statusClass = 'none';
      if(st.status==='done'){ statusLabel='前回 '+st.last; statusClass='done'; }
      if(st.status==='upcoming'){ statusLabel='次回予定 '+st.next; statusClass='upcoming'; }
      if(st.status==='overdue'){ statusLabel='期限超過 '+st.next; statusClass='overdue'; }
      html += '<div class="card '+(st.status==='overdue'?'overdue':'')+'" onclick="openDetail(\''+f.id+'\')">'
        + '<div class="card-top"><span class="badge '+f.kind+'">'+f.kind+'</span></div>'
        + '<div class="card-name">'+f.name+'</div>'
        + '<div class="card-addr">'+f.addr+'</div>'
        + '<div class="card-meta"><span class="rep">担当：'+f.rep+'</span><span class="visit-status '+statusClass+'">'+statusLabel+'</span></div>'
        + '</div>';
    });
  });
  container.innerHTML = html;
}

function openDetail(facilityId){
  currentFacilityId = facilityId;
  const f = facilities.find(x=>x.id===facilityId);
  if(!f) return;
  document.getElementById('dKind').textContent = f.kind;
  document.getElementById('dKind').className = 'badge '+f.kind;
  document.getElementById('dName').textContent = f.name;
  document.getElementById('dAddr').textContent = f.addr;
  document.getElementById('dMapLink').href = 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(f.addr);
  document.getElementById('vDate').value = todayStr();
  document.getElementById('vRep').value = repList.includes(f.rep) ? f.rep : 'その他';
  document.getElementById('vMemo').value = '';
  document.getElementById('vNext').value = '';
  renderHistory(facilityId);
  document.getElementById('detailOverlay').classList.add('show');
}
function closeDetail(){
  document.getElementById('detailOverlay').classList.remove('show');
  currentFacilityId = null;
}

function renderHistory(facilityId){
  const vs = visitsFor(facilityId);
  const el = document.getElementById('dHistory');
  if(vs.length===0){ el.innerHTML = '<div class="empty">まだ訪問記録がありません</div>'; return; }
  el.innerHTML = vs.map(v=>
    '<div class="hist-item">'
    + '<button class="del-btn" onclick="removeVisit(\''+v.id+'\')">削除</button>'
    + '<span class="hist-date">'+v.visitDate+'</span><span class="hist-rep">'+v.rep+'</span>'
    + (v.memo ? '<div class="hist-memo">'+escapeHtml(v.memo)+'</div>' : '')
    + (v.nextVisit ? '<div class="hist-next">次回予定：'+v.nextVisit+'</div>' : '')
    + '</div>'
  ).join('');
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function submitVisit(){
  if(!currentFacilityId) return;
  const f = facilities.find(x=>x.id===currentFacilityId);
  const date = document.getElementById('vDate').value;
  if(!date){ showToast('訪問日を入力してください'); return; }
  const btn = document.getElementById('vSaveBtn');
  btn.disabled = true; btn.textContent = '保存中...';
  const payload = {
    action:'addVisit', password:currentPassword,
    facilityId: f.id, facilityName: f.name,
    visitDate: date, rep: document.getElementById('vRep').value,
    memo: document.getElementById('vMemo').value,
    nextVisit: document.getElementById('vNext').value
  };
  try{
    const res = await fetch(GAS_URL, {method:'POST', body: JSON.stringify(payload)});
    const data = await res.json();
    if(data.ok){
      visits.push({
        id:data.id, facilityId:f.id, facilityName:f.name, visitDate:date,
        rep:payload.rep, memo:payload.memo, nextVisit:payload.nextVisit, createdAt: new Date().toISOString()
      });
      renderHistory(f.id);
      renderAll();
      showToast('訪問記録を保存しました');
      document.getElementById('vMemo').value='';
      document.getElementById('vNext').value='';
    } else {
      showToast('保存に失敗しました: '+(data.error||''));
    }
  }catch(err){
    showToast('通信エラーが発生しました');
    console.error(err);
  }
  btn.disabled = false; btn.textContent = 'この内容で記録する';
}

async function removeVisit(id){
  if(!confirm('この訪問記録を削除しますか？')) return;
  try{
    const res = await fetch(GAS_URL, {method:'POST', body: JSON.stringify({action:'deleteVisit', password:currentPassword, id:id})});
    const data = await res.json();
    if(data.ok){
      visits = visits.filter(v=>v.id!==id);
      renderHistory(currentFacilityId);
      renderAll();
      showToast('削除しました');
    }
  }catch(err){ console.error(err); }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display='block';
  setTimeout(()=>{ t.style.display='none'; }, 2200);
}

/* ---------- ジオコーディング（住所→緯度経度）：初回のみ・順次キャッシュ（現在地から絞り込む機能のために利用） ---------- */
async function processGeocodeQueue(){
  const queue = facilities.filter(f=>!f.lat || !f.lng);
  if(queue.length===0) return;
  const toastEl = document.getElementById('geoToast');
  toastEl.style.display='block';
  for(let i=0;i<queue.length;i++){
    const f = queue[i];
    toastEl.textContent = '位置情報を準備中 ('+(i+1)+'/'+queue.length+')';
    try{
      const q = encodeURIComponent(f.addr + (f.addr.includes('大分県')?'':' 大分県'));
      const res = await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=jp&q='+q);
      const arr = await res.json();
      if(arr && arr[0]){
        f.lat = parseFloat(arr[0].lat);
        f.lng = parseFloat(arr[0].lon);
        fetch(GAS_URL, {method:'POST', body: JSON.stringify({action:'updateLatLng', password:currentPassword, facilityId:f.id, lat:f.lat, lng:f.lng})}).catch(()=>{});
      }
    }catch(err){ console.error('geocode error', f.name, err); }
    await new Promise(r=>setTimeout(r, 1100)); // Nominatim利用ポリシー：1req/sec厳守
  }
  toastEl.style.display='none';
}
/* ---------- 月別訪問実績 ---------- */
function openMonthly(){
  renderMonthly();
  document.getElementById('monthlyOverlay').classList.add('show');
}
function closeMonthly(){
  document.getElementById('monthlyOverlay').classList.remove('show');
}
function renderMonthly(){
  const counts = {};
  visits.forEach(v=>{
    if(!v.visitDate) return;
    const m = v.visitDate.slice(0,7);
    if(!counts[m]) counts[m] = {total:0, facilities:new Set()};
    counts[m].total++;
    counts[m].facilities.add(v.facilityId);
  });
  const months = Object.keys(counts).sort().reverse().slice(0,12);
  const el = document.getElementById('monthlyList');
  if(months.length===0){ el.innerHTML = '<div class="empty">まだ訪問記録がありません</div>'; return; }
  const maxCount = Math.max(1, ...months.map(m=>counts[m].total));
  el.innerHTML = months.map(m=>{
    const c = counts[m];
    const pct = Math.round(c.total / maxCount * 100);
    const [y,mo] = m.split('-');
    return '<div class="month-bar-row">'
      + '<div class="month-bar-label">'+y+'年'+parseInt(mo)+'月</div>'
      + '<div class="month-bar-track"><div class="month-bar-fill" style="width:'+pct+'%"></div></div>'
      + '<div class="month-bar-value">'+c.total+'件（'+c.facilities.size+'施設）</div>'
      + '</div>';
  }).join('');
}

/* ---------- パスワード変更 ---------- */

  document.getElementById('pwNew1').value = '';
  document.getElementById('pwNew2').value = '';
  document.getElementById('pwErr').textContent = '';
  document.getElementById('repErr').textContent = '';

function closePwChange(){

}
async function submitPwChange(){
  const oldPw = document.getElementById('pwOld').value;
  const new1 = document.getElementById('pwNew1').value;
  const new2 = document.getElementById('pwNew2').value;
  const errEl = document.getElementById('pwErr');
  errEl.textContent = '';
  if(new1.length < 4){ errEl.textContent = '新しいパスワードは4文字以上にしてください'; return; }
  if(new1 !== new2){ errEl.textContent = '新しいパスワードが一致しません'; return; }
  const btn = document.getElementById('pwSaveBtn');
  btn.disabled = true; btn.textContent = '変更中...';
  try{
    const res = await fetch(GAS_URL, {method:'POST', body: JSON.stringify({action:'changePassword', oldPassword:oldPw, newPassword:new1})});
    const data = await res.json();
    if(data.ok){
      currentPassword = new1;
      closePwChange();
      showToast('パスワードを変更しました');
    } else {
      errEl.textContent = data.error || '変更に失敗しました';

    errEl.textContent = '通信エラーが発生しました';

}

/* ---------- 担当者管理 ---------- */
function renderRepChips(){
  const el = document.getElementById('repChips');
  if(repListDraft.length===0){ el.innerHTML = '<span style="color:var(--text-soft);font-size:12px;">担当者がいません</span>'; return; }

    '<span class="rep-chip">'+escapeHtml(r)+'<button onclick="removeRepLocal(\''+escapeHtml(r).replace(/'/g,"\\'")+'\')">×</button></span>'
  ).join('');

function addRepLocal(){
  const input = document.getElementById('repNewName');
  const name = input.value.trim();
  if(!name) return;

/* ================= 案件管理（元 営業記録.html を移植） ================= */
const DEAL_TODAY = new Date();
DEAL_TODAY.setHours(0,0,0,0);

let dealRecords = [];
let dealEditId = null;
let dealActiveMonth = 'all';
let dealCbCount = 0;
let dealMonthlyShown = false;

function dealSetSyncStatus(msg, ok=true){
  const el = document.getElementById('dl-sync-status');
  el.textContent = msg;
  el.style.color = ok ? '' : 'var(--dl-red)';
}

// JSONPでGASを呼び出す（既存の案件管理バックエンドの仕様に合わせる）
function dealGasCall(params){
  return new Promise((resolve, reject) => {
    const cbName = '__dealCb' + (dealCbCount++);
    const timeout = setTimeout(() => {
      delete window[cbName];
      reject(new Error('timeout'));
    }, 15000);

    window[cbName] = function(data) {
      clearTimeout(timeout);
      delete window[cbName];
      const el = document.getElementById('jsonp-' + cbName);
      if (el) el.remove();
      resolve(data);
    };

    params.callback = cbName;
    const qs = Object.entries(params).map(([k,v]) => encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');
    const script = document.createElement('script');
    script.id = 'jsonp-' + cbName;
    script.src = DEAL_GAS_URL + '?' + qs;
    script.onerror = () => { clearTimeout(timeout); delete window[cbName]; reject(new Error('load error')); };
    document.head.appendChild(script);
  });
}

async function dealLoadAll(){
  try{
    dealSetSyncStatus('読み込み中...');
    const data = await dealGasCall({action:'getAll'});
    dealRecords = Array.isArray(data) ? data : [];
    dealSetSyncStatus(`✓ 同期済み ${dealRecords.length}件`);
    dealBuildMonthTabs();
    dealRender();
  }catch(e){
    dealSetSyncStatus('⚠ 読み込みエラー', false);
    document.getElementById('dl-table-body').innerHTML = '<tr><td colspan="11" style="text-align:center;padding:30px;color:#dc2626">データの読み込みに失敗しました。再読み込みしてください。</td></tr>';
  }
}

function dealGetMonth(r){ return r.consult ? r.consult.slice(0,7) : ''; }

function dealBuildMonthTabs(){
  const monthSet = new Set();
  dealRecords.forEach(r => { if (r.consult) monthSet.add(r.consult.slice(0,7)); });
  const months = Array.from(monthSet).sort().reverse();
  const tabs = document.getElementById('dl-month-tabs');
  tabs.innerHTML = `<button class="dl-month-tab ${dealActiveMonth==='all'?'active':''}" onclick="dealSetMonth('all')">すべて<span class="dl-tab-cnt">${dealRecords.length}</span></button>`;
  months.forEach(m => {
    const cnt = dealRecords.filter(r => dealGetMonth(r) === m).length;
    const [y, mo] = m.split('-');
    tabs.innerHTML += `<button class="dl-month-tab ${dealActiveMonth===m?'active':''}" onclick="dealSetMonth('${m}')">${y}年${parseInt(mo)}月<span class="dl-tab-cnt">${cnt}</span></button>`;
  });
}

function dealSetMonth(m){ dealActiveMonth = m; dealBuildMonthTabs(); dealRender(); }

function dealIsOverdue(rec){
  if (rec.status === '成約' || rec.status === '失注') return false;
  const ref = rec.closeDate || rec.consult;
  if (!ref) return false;
  const d = new Date(ref); d.setHours(0,0,0,0);
  return (DEAL_TODAY - d) > 7 * 86400000;
}

function dealStatusClass(s){
  return {商談中:'dl-s-active',成約:'dl-s-success',失注:'dl-s-lost',保留:'dl-s-hold'}[s] || 'dl-s-active';
}

function dealFmt(d){
  if (!d) return '—';
  const parts = d.split('-');
  return `${parseInt(parts[1])}/${parseInt(parts[2])}`;
}

function dealRender(){
  const q = document.getElementById('dl-search').value.toLowerCase();
  const fs = document.getElementById('dl-filter-status').value;
  const fc = document.getElementById('dl-filter-care').value;
  const fg = document.getElementById('dl-filter-gender').value;

  let filtered = dealRecords.filter(r => {
    if (dealActiveMonth !== 'all' && dealGetMonth(r) !== dealActiveMonth) return false;
    if (fs && r.status !== fs) return false;
    if (fc && r.care !== fc) return false;
    if (fg && r.gender !== fg) return false;
    if (q && !`${r.name}${r.facility}${r.staff}${r.memo}`.toLowerCase().includes(q)) return false;
    return true;
  });

  document.getElementById('dl-cnt-all').textContent = dealRecords.length;
  document.getElementById('dl-cnt-active').textContent = dealRecords.filter(r=>r.status==='商談中').length;
  document.getElementById('dl-cnt-alert').textContent = dealRecords.filter(dealIsOverdue).length;
  document.getElementById('dl-cnt-success').textContent = dealRecords.filter(r=>r.status==='成約').length;
  document.getElementById('dl-cnt-lost').textContent = dealRecords.filter(r=>r.status==='失注').length;

  if(dealMonthlyShown) renderDealMonthly();

  const tbody = document.getElementById('dl-table-body');
  document.getElementById('dl-empty-msg').style.display = filtered.length ? 'none' : 'block';
  if (filtered.length === 0) { tbody.innerHTML = ''; return; }

  tbody.innerHTML = filtered.map((r, i) => {
    const over = dealIsOverdue(r);
    const closeDiff = r.closeDate ? Math.floor((DEAL_TODAY - new Date(r.closeDate)) / 86400000) : null;
    const closeFmt = r.closeDate
      ? `<span class="${closeDiff > 7 && r.status==='商談中' ? 'dl-date-overdue' : ''}">${dealFmt(r.closeDate)}</span>${over ? '<span class="dl-alert-badge">未対応</span>' : ''}`
      : '—';
    const memo = r.memo ? `<span title="${String(r.memo).replace(/"/g,'&quot;')}" style="cursor:default">📝</span>` : '—';
    return `<tr class="${over ? 'dl-alert-row' : ''}">
      <td style="color:var(--text-soft);font-size:11px">${i+1}</td>
      <td>${dealFmt(r.consult)}</td>
      <td style="font-weight:600">${r.name}</td>
      <td><span class="dl-care">${r.care||'—'}</span></td>
      <td>${r.gender||'—'}</td>
      <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis">${r.facility||'—'}</td>
      <td>${closeFmt}</td>
      <td><span class="dl-status ${dealStatusClass(r.status)}" onclick="dealCycleStatus(this.dataset.id)" data-id="${r.id}">${r.status}</span></td>
      <td>${r.staff||'—'}</td>
      <td>${memo}</td>
      <td><div class="dl-action-btns">
        <button class="dl-btn-icon" title="編集" onclick="dealEditRecord(this.dataset.id)" data-id="${r.id}">✏️</button>
        <button class="dl-btn-icon" title="削除" onclick="dealDeleteRecord(this.dataset.id)" data-id="${r.id}">🗑️</button>
      </div></td>
    </tr>`;
  }).join('');
}

async function dealCycleStatus(id){
  const order = ['商談中','成約','失注','保留'];
  const r = dealRecords.find(x=>String(x.id)===String(id));
  if (!r) return;
  r.status = order[(order.indexOf(r.status)+1) % order.length];
  dealRender();
  dealSetSyncStatus('保存中...');
  try { await dealGasCall({action:'save', ...r}); dealSetSyncStatus('✓ 保存しました'); }
  catch { dealSetSyncStatus('⚠ 保存エラー', false); }
}

function dealOpenModal(id=null){
  dealEditId = id;
  const m = id ? dealRecords.find(r=>String(r.id)===String(id)) : null;
  document.getElementById('dl-modal-title').textContent = id ? '案件を編集' : '新規案件を追加';
  document.getElementById('dl-f-consult').value = m?.consult || new Date().toISOString().slice(0,10);
  document.getElementById('dl-f-close').value = m?.closeDate || '';
  document.getElementById('dl-f-name').value = m?.name || '';
  document.getElementById('dl-f-care').value = m?.care || '';
  document.getElementById('dl-f-gender').value = m?.gender || '';
  document.getElementById('dl-f-facility').value = m?.facility || '';
  document.getElementById('dl-f-status').value = m?.status || '商談中';
  document.getElementById('dl-f-staff').value = m?.staff || '';
  document.getElementById('dl-f-memo').value = m?.memo || '';
  document.getElementById('dl-modal').classList.add('open');
}

function dealCloseModal(){ document.getElementById('dl-modal').classList.remove('open'); dealEditId = null; }

async function dealSaveRecord(){
  const name = document.getElementById('dl-f-name').value.trim();
  const consult = document.getElementById('dl-f-consult').value;
  if (!name || !consult) { alert('相談日と利用者氏名は必須です'); return; }
  const data = {
    id: dealEditId || String(Date.now()),
    consult, name,
    care: document.getElementById('dl-f-care').value,
    gender: document.getElementById('dl-f-gender').value,
    facility: document.getElementById('dl-f-facility').value.trim(),
    closeDate: document.getElementById('dl-f-close').value,
    status: document.getElementById('dl-f-status').value,
    staff: document.getElementById('dl-f-staff').value.trim(),
    memo: document.getElementById('dl-f-memo').value.trim()
  };
  const btn = document.getElementById('dl-save-btn');
  btn.textContent = '保存中...'; btn.disabled = true;
  try{
    await dealGasCall({action:'save', ...data});
    if (dealEditId) { const i = dealRecords.findIndex(r=>String(r.id)===String(dealEditId)); dealRecords[i] = data; }
    else { dealRecords.unshift(data); dealActiveMonth = data.consult.slice(0,7); }
    dealSetSyncStatus('✓ 保存しました');
    dealCloseModal(); dealBuildMonthTabs(); dealRender();
  }catch{
    dealSetSyncStatus('⚠ 保存エラー', false);
    alert('保存に失敗しました。再度お試しください。');
  }finally{ btn.textContent = '保存'; btn.disabled = false; }
}

function dealEditRecord(id){ dealOpenModal(id); }

async function dealDeleteRecord(id){
  const r = dealRecords.find(x=>String(x.id)===String(id));
  if (!r || !confirm(`「${r.name}」を削除しますか？`)) return;
  dealRecords = dealRecords.filter(x=>String(x.id)!==String(id));
  dealBuildMonthTabs(); dealRender();
  dealSetSyncStatus('削除中...');
  try { await dealGasCall({action:'delete', id}); dealSetSyncStatus('✓ 削除しました'); }
  catch { dealSetSyncStatus('⚠ 削除エラー', false); }
}

function toggleDealMonthly(){
  dealMonthlyShown = !dealMonthlyShown;
  document.getElementById('dl-monthly-compare').style.display = dealMonthlyShown ? 'block':'none';
  if(dealMonthlyShown) renderDealMonthly();
}

function renderDealMonthly(){
  const byMonth = {};
  dealRecords.forEach(r=>{
    const m = dealGetMonth(r);
    if(!m) return;
    if(!byMonth[m]) byMonth[m] = {total:0, success:0, lost:0};
    byMonth[m].total++;
    if(r.status==='成約') byMonth[m].success++;
    if(r.status==='失注') byMonth[m].lost++;
  });
  const months = Object.keys(byMonth).sort().reverse();
  const el = document.getElementById('dl-monthly-compare');
  if(months.length===0){ el.innerHTML = '<div class="dl-empty">データがありません</div>'; return; }
  let html = '<table style="width:100%;border-collapse:collapse;font-size:12px;">'
    + '<thead><tr style="background:var(--dl-accent);color:#fff;">'
    + '<th style="padding:6px 8px;text-align:left;">月</th><th style="padding:6px 8px;">相談件数</th>'
    + '<th style="padding:6px 8px;">成約</th><th style="padding:6px 8px;">失注</th><th style="padding:6px 8px;">成約率</th>'
    + '</tr></thead><tbody>';
  months.forEach(m=>{
    const d = byMonth[m];
    const rate = d.total ? Math.round(d.success/d.total*100) : 0;
    const [y,mo] = m.split('-');
    html += '<tr style="border-bottom:1px solid var(--dl-border);">'
      + '<td style="padding:6px 8px;">'+y+'年'+parseInt(mo)+'月</td>'
      + '<td style="padding:6px 8px;text-align:center;">'+d.total+'</td>'
      + '<td style="padding:6px 8px;text-align:center;color:var(--dl-green);font-weight:700;">'+d.success+'</td>'
      + '<td style="padding:6px 8px;text-align:center;color:var(--dl-red);">'+d.lost+'</td>'
      + '<td style="padding:6px 8px;text-align:center;font-weight:700;">'+rate+'%</td></tr>';
  });
  html += '</tbody></table>';
  el.innerHTML = html;
}

function dealExportCSV(){
  const header = ['id','相談日','利用者氏名','介護度','性別','希望施設','クロージング日','ステータス','担当者','メモ'];
  const target = dealActiveMonth === 'all' ? dealRecords : dealRecords.filter(r => dealGetMonth(r) === dealActiveMonth);
  const rows = target.map(r => [r.id,r.consult,r.name,r.care,r.gender,r.facility,r.closeDate,r.status,r.staff,r.memo].map(v=>`"${(v||'').replace(/"/g,'""')}"`));
  const csv = '\uFEFF' + [header, ...rows].map(r=>r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `営業記録_${dealActiveMonth === 'all' ? '全件' : dealActiveMonth}.csv`;
  a.click();
}

['dl-search','dl-filter-status','dl-filter-care','dl-filter-gender'].forEach(id => {
  document.getElementById(id).addEventListener('input', dealRender);
});
document.getElementById('dl-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('dl-modal')) dealCloseModal();
});
